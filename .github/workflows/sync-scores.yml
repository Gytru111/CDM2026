name: 🔄 Sync Scores CDM 2026
# trigger resync

on:
  # ── Toutes les 5 minutes, en continu (minimum supporté par GitHub Actions)
  schedule:
    - cron: '*/5 * * * *'

  # ── Déclenchement manuel depuis GitHub (onglet Actions)
  workflow_dispatch:

jobs:
  sync:
    name: Fetch ESPN → Firebase
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 🔄 Sync scores ESPN → Firebase
        env:
          FIREBASE_DB_SECRET: ${{ secrets.FIREBASE_DB_SECRET }}
        run: node sync-scores.js
        working-directory: .

      - name: ✅ Done
        run: echo "Sync terminé à $(date -u)"
